aid: capn-proto
url: >-
  https://raw.githubusercontent.com/api-evangelist/capn-proto/refs/heads/main/apis.yml
name: Cap'n Proto
description: >-
  Cap'n Proto is an open-source binary data interchange format and
  capability-based RPC protocol specification originally created by
  Kenton Varda. Unlike Protocol Buffers, Cap'n Proto's in-memory
  representation is identical to its wire format, enabling zero-copy
  deserialization, incremental reads, random field access, and
  memory-mapped I/O. The reference implementation is in C++; a
  broad ecosystem of community-maintained bindings covers C#, Erlang,
  Go, Haskell, JavaScript/Node, OCaml, Python, Rust, C, D, Java, Lua,
  Nim, Ruby, and Scala.
type: Index
x-type: standard
position: Producer
access: Open Source
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Binary Format
  - Capability-Based Security
  - Code Generation
  - IPC
  - Open Source
